name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: echo "Pas de tests"

  lint-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    needs: [test, lint-docker]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Login GHCR (plus DockerHub)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build backend
      - name: Build backend
        run: docker build -t ghcr.io/natalene35/task-manager/backend:latest ./backend

      # Build frontend
      - name: Build frontend
        run: docker build -t ghcr.io/natalene35/task-manager/frontend:latest ./frontend

      # Scan vulnérabilités
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/natalene35/task-manager/backend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/natalene35/task-manager/frontend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      # Push
      - name: Push backend
        run: docker push ghcr.io/natalene35/task-manager/backend:latest

      - name: Push frontend
        run: docker push ghcr.io/natalene35/task-manager/frontend:latest
